<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with SACHA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<link rel="icon" type="image/png" href="assets/avatar.png">
</head>
<body data-page="chat">

<div class="chat-shell">

  <aside class="side" id="sidebar">
    <div class="side-head">
      <a class="brand" href="index.html">
        <img class="word" src="assets/logo.png" alt="SACHA">
        <img class="quill" src="assets/feather.png" alt="">
      </a>
    </div>

    <button class="side-new" id="btnNew">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      <span data-i18n="chat.newChat">New chat</span>
    </button>

    <nav class="side-nav">
      <p class="side-label" data-i18n="chat.today">Today</p>
      <button class="side-item active">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4 8.9 8.9 0 0 1-3.5-.7L3 21l1.8-4.4A8.4 8.4 0 1 1 21 11.5z"/></svg>
        <span data-i18n="chat.active">Chat with SACHA</span>
      </button>
    </nav>

    <div class="side-user">
      <div class="av"><img src="assets/avatar.png" alt=""></div>
      <div>
        <b id="userName">reader</b>
        <span id="userMail" data-i18n="chat.demoAccount">demo account</span>
      </div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </div>
  </aside>
  <div class="side-backdrop" id="backdrop"></div>

  <section class="chat-main">
    <div class="chat-top">
      <a class="icon-btn menu-toggle" id="btnMenu" data-i18n-aria="chat.openMenu" aria-label="Open menu" href="#" style="margin-right:auto">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </a>
      <span data-lang-toggle></span>
      <a class="icon-btn" href="intro.html" data-i18n-aria="chat.about" data-i18n-title="chat.about" aria-label="About SACHA" title="About SACHA">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.3a2.6 2.6 0 0 1 5.1.7c0 1.7-2.6 2.2-2.6 3.6"/><circle cx="12" cy="17.3" r=".4" fill="currentColor"/></svg>
      </a>
      <a class="icon-btn" href="index.html" data-i18n-aria="chat.exit" data-i18n-title="chat.exit" aria-label="Leave for home page" title="Leave for home page">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4h4v16h-4M10 17l5-5-5-5M15 12H3"/></svg>
      </a>
    </div>

    <div class="chat-panel">
      <div class="msgs" id="msgs" aria-live="polite"></div>

      <div class="suggestions" id="chips">
        <button class="chip" data-i18n="chat.chip1">What is SACHA?</button>
        <button class="chip" data-i18n="chat.chip2">How does a chatbot work?</button>
        <button class="chip" data-i18n="chat.chip3">Does AI really think?</button>
        <button class="chip" data-i18n="chat.chip4">What is a probabilistic model?</button>
      </div>

      <form class="composer" id="composer">
        <textarea id="input" rows="1" data-i18n-placeholder="chat.placeholder" placeholder="Write your message ..." data-i18n-aria="chat.message" aria-label="Message"></textarea>
        <button class="send-btn" id="btnSend" type="submit" data-i18n-aria="chat.send" aria-label="Send" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </form>
      <p class="composer-note" data-i18n="chat.note">SACHA is an educational prototype — responses here are scripted for demonstration.</p>
    </div>
  </section>
</div>

<div id="toast" role="status"></div>
<script src="assets/i18n.js"></script>
<script src="assets/app.js"></script>
<script>
const msgs = document.getElementById('msgs');
const input = document.getElementById('input');
const composer = document.getElementById('composer');
const btnSend = document.getElementById('btnSend');
const chips = document.getElementById('chips');
const userNameEl = document.getElementById('userName');
let fb = 0;

function isStoredName(name){
  return name && name !== 'leitor(a)' && name !== 'reader';
}

function syncUserName(){
  try{
    const n = sessionStorage.getItem('sachaUser');
    userNameEl.textContent = isStoredName(n) ? n : t('chat.reader');
  }catch(_){
    userNameEl.textContent = t('chat.reader');
  }
}
syncUserName();

function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }
function scrollEnd(){ msgs.scrollTop = msgs.scrollHeight; }

function addUser(text){
  msgs.appendChild(el(`
    <div class="msg user">
      <img class="feather-mark" src="assets/feather.png" alt="">
      <div><div class="bubble"></div></div>
    </div>`));
  msgs.lastElementChild.querySelector('.bubble').textContent = text;
  scrollEnd();
}
function addBot(text){
  msgs.appendChild(el(`
    <div class="msg bot">
      <div class="av"><img src="assets/avatar.png" alt=""></div>
      <div><div class="who">SACHA</div><div class="bubble"></div></div>
    </div>`));
  msgs.lastElementChild.querySelector('.bubble').textContent = text;
  scrollEnd();
}
function addTyping(){
  msgs.appendChild(el(`
    <div class="msg bot typing" id="typing">
      <div class="av"><img src="assets/avatar.png" alt=""></div>
      <div><div class="who">SACHA</div><div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>
    </div>`));
  scrollEnd();
}
function removeTyping(){ document.getElementById('typing')?.remove(); }

function reply(text){
  const q = text.toLowerCase();
  for(const item of getChatScript()){
    if(item.k.some(k=>q.includes(k))) return item.r;
  }
  const fallbacks = getChatFallback();
  return fallbacks[(fb++) % fallbacks.length];
}

function send(text){
  text = text.trim();
  if(!text) return;
  addUser(text);
  input.value=''; autoSize(); btnSend.disabled = true;
  setTimeout(addTyping, 350);
  setTimeout(()=>{ removeTyping(); addBot(reply(text)); }, 1300 + Math.random()*800);
}

composer.addEventListener('submit', e=>{ e.preventDefault(); send(input.value); });
input.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(input.value); }
});
input.addEventListener('input', ()=>{ btnSend.disabled = !input.value.trim(); autoSize(); });
function autoSize(){ input.style.height='auto'; input.style.height = Math.min(input.scrollHeight,140)+'px'; }

chips.addEventListener('click', e=>{
  if(e.target.classList.contains('chip')) send(e.target.textContent);
});

document.getElementById('btnNew').addEventListener('click', ()=>{
  msgs.innerHTML=''; fb=0; greet(); toast(t('chat.newChatToast'));
});

const sb = document.getElementById('sidebar'), bd = document.getElementById('backdrop');
document.getElementById('btnMenu').addEventListener('click', e=>{
  e.preventDefault(); sb.classList.add('open'); bd.classList.add('show');
});
bd.addEventListener('click', ()=>{ sb.classList.remove('open'); bd.classList.remove('show'); });

function greet(){
  let name='';
  try{ name = sessionStorage.getItem('sachaUser') || ''; }catch(_){}
  if(!isStoredName(name)) name = '';
  addBot(getChatGreet(name));
}

document.addEventListener('sacha:langchange', syncUserName);

greet();
</script>
</body>
</html>
